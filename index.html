<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>☕ コーヒー回数券</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f0e8;
    --bg2: #efe5d8;
    --card: #fffcf8;
    --brown-dark: #2c1a0e;
    --brown: #6b3e1e;
    --brown-mid: #a0622a;
    --brown-light: #c8956c;
    --cream: #f5e6d0;
    --cream2: #ecdcc8;
    --gold: #d4a843;
    --green: #5a8a3c;
    --red: #c04040;
    --border: #ddd0c0;
    --text: #2c1a0e;
    --text2: #7a5a3a;
    --text3: #a08060;
    --shadow: rgba(107,62,30,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown) 100%);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .header-logo { font-size:36px; }
  .header-title { font-family:'Noto Serif JP',serif; font-size:22px; font-weight:900; color:#f5e6d0; letter-spacing:.1em; }
  .header-sub { font-size:11px; color:#c8a882; letter-spacing:.12em; margin-top:2px; }
  .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .header-btn {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: #f5e6d0;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all .2s;
    letter-spacing: .06em;
    white-space: nowrap;
  }
  .header-btn:hover { background: rgba(255,255,255,0.2); }
  .header-btn.save-btn {
    background: rgba(212,168,67,0.25);
    border-color: rgba(212,168,67,0.6);
    color: #ffe890;
  }
  .header-btn.save-btn:hover { background: rgba(212,168,67,0.4); }
  .header-btn.load-btn {
    background: rgba(90,138,60,0.2);
    border-color: rgba(90,138,60,0.5);
    color: #b8e890;
  }
  .header-btn.load-btn:hover { background: rgba(90,138,60,0.35); }
  .header-divider {
    width:1px; height:32px;
    background: rgba(255,255,255,0.2);
    margin: 0 4px;
  }

  /* ===== LAYOUT ===== */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 74px);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: var(--bg2);
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size:11px;
    font-weight:700;
    color:var(--text3);
    letter-spacing:.14em;
    padding: 20px 20px 10px;
    text-transform: uppercase;
  }
  .user-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    cursor: pointer;
    border-left: 4px solid transparent;
    transition: all .15s;
    border-bottom: 1px solid var(--border);
  }
  .user-item:hover { background: var(--cream); }
  .user-item.active {
    background: var(--card);
    border-left-color: var(--brown-light);
  }
  .user-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items:center; justify-content:center;
    font-size: 18px;
    font-weight: 900;
    flex-shrink: 0;
    font-family: 'Noto Serif JP', serif;
  }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-meta { font-size:11px; color:var(--text3); margin-top:2px; }
  .user-tickets-badge {
    background: var(--brown-light);
    color: #fff;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }
  .user-tickets-badge.empty { background: var(--border); color: var(--text3); }

  /* ===== MAIN ===== */
  .main {
    padding: 28px;
    overflow-y: auto;
    max-height: calc(100vh - 74px);
  }

  /* empty state */
  .empty-state {
    display: flex; flex-direction:column; align-items:center; justify-content:center;
    height: 60vh;
    color: var(--text3);
    gap: 16px;
    text-align:center;
  }
  .empty-state .icon { font-size:64px; opacity:.4; }
  .empty-state h2 { font-size:20px; font-family:'Noto Serif JP',serif; font-weight:700; color:var(--text2); }
  .empty-state p { font-size:14px; }

  /* ===== USER DETAIL ===== */
  .user-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .user-header-avatar {
    width: 64px; height:64px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:900;
    font-family:'Noto Serif JP',serif;
    flex-shrink:0;
  }
  .user-header-name { font-family:'Noto Serif JP',serif; font-size:26px; font-weight:900; }
  .user-header-since { font-size:12px; color:var(--text3); margin-top:4px; }
  .user-header-actions { display:flex; gap:10px; margin-left:auto; }
  .btn-edit {
    padding:9px 18px;
    border:2px solid var(--border);
    background:var(--card);
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    color:var(--text2);
    font-family:'Noto Sans JP',sans-serif;
    transition:all .2s;
  }
  .btn-edit:hover { border-color:var(--brown-light); color:var(--brown); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    text-align:center;
  }
  .stat-num { font-size:36px; font-weight:900; font-family:'Noto Serif JP',serif; line-height:1; }
  .stat-label { font-size:11px; color:var(--text3); margin-top:6px; letter-spacing:.08em; }

  /* BOOKS SECTION */
  .section-title {
    font-family:'Noto Serif JP',serif;
    font-size:16px; font-weight:700;
    color:var(--brown);
    margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ACTION BUTTONS ROW */
  .action-row {
    display:flex; gap:12px; margin-bottom:24px;
    flex-wrap:wrap;
  }
  .btn-buy {
    flex:1; min-width:180px;
    padding:16px 24px;
    background: linear-gradient(135deg, var(--brown), var(--brown-mid));
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
    box-shadow: 0 4px 16px rgba(107,62,30,0.35);
    transition:all .2s;
    letter-spacing:.06em;
  }
  .btn-buy:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(107,62,30,0.45); }
  .btn-use {
    flex:1; min-width:180px;
    padding:16px 24px;
    background: linear-gradient(135deg, var(--brown-light), #b07040);
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
    box-shadow: 0 4px 16px rgba(200,149,108,0.4);
    transition:all .2s;
    letter-spacing:.06em;
  }
  .btn-use:hover { transform:translateY(-2px); }
  .btn-use:disabled { background:var(--border); box-shadow:none; cursor:not-allowed; transform:none; }

  /* BOOK CARDS */
  .books-grid { display:flex; flex-direction:column; gap:14px; margin-bottom:24px; }
  .book-card {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    padding:20px;
    transition:border-color .2s;
  }
  .book-card.active-book { border-color:var(--brown-light); }
  .book-card.complete { border-color:var(--green); background:linear-gradient(135deg,#f5fbf0,var(--card)); }
  .book-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .book-id { font-size:12px; color:var(--text3); font-weight:700; letter-spacing:.1em; }
  .book-status {
    font-size:12px; font-weight:700; padding:3px 12px; border-radius:20px;
  }
  .book-status.in-use { background:var(--cream); color:var(--brown-mid); }
  .book-status.done { background:#e8f5e0; color:var(--green); }
  .tickets-row {
    display:grid;
    grid-template-columns: repeat(11, 1fr);
    gap:5px;
    margin-bottom:12px;
  }
  .t-cell {
    aspect-ratio:1;
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:12px;
    font-weight:700;
    transition:all .3s;
    border:1.5px solid;
  }
  .t-cell.unused { background:#fdf0e6; border-color:#e8c8a0; color:#c8956c; }
  .t-cell.used { background:#f0e8de; border-color:#d4b898; opacity:.55; }
  .t-cell.bonus { background:linear-gradient(135deg,#fff4d0,#ffe890); border-color:#d4a843; color:#8a6010; }
  .book-footer { display:flex; justify-content:space-between; align-items:center; }
  .book-dates { font-size:11px; color:var(--text3); }
  .book-remain { font-weight:700; color:var(--brown-mid); font-size:14px; }

  /* UNDO btn */
  .btn-undo {
    padding:8px 16px;
    border:2px solid var(--border);
    background:var(--card);
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    color:var(--text3);
    font-family:'Noto Sans JP',sans-serif;
    transition:all .2s;
  }
  .btn-undo:hover { border-color:var(--brown-light); }

  /* HISTORY */
  .history-table { width:100%; border-collapse:collapse; }
  .history-table th {
    background:var(--bg2);
    padding:10px 14px;
    font-size:12px;
    color:var(--text3);
    letter-spacing:.08em;
    font-weight:700;
    text-align:left;
    border-bottom:2px solid var(--border);
  }
  .history-table td {
    padding:11px 14px;
    font-size:13px;
    border-bottom:1px solid var(--border);
  }
  .history-table tr:last-child td { border-bottom:none; }
  .badge-buy { background:#e8f5e0; color:var(--green); padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
  .badge-use { background:#fdf0e6; color:var(--brown-light); padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
  .history-wrap {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    overflow:hidden;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.5);
    z-index:200;
    display:none;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card);
    border-radius:20px;
    padding:32px;
    width:460px;
    max-width:90vw;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:modalIn .25s ease;
  }
  @keyframes modalIn {
    from { transform:scale(.9) translateY(20px); opacity:0; }
    to { transform:scale(1) translateY(0); opacity:1; }
  }
  .modal-title { font-family:'Noto Serif JP',serif; font-size:20px; font-weight:900; margin-bottom:20px; color:var(--brown-dark); }
  .form-group { margin-bottom:16px; }
  .form-label { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:6px; display:block; letter-spacing:.06em; }
  .form-input {
    width:100%;
    padding:12px 14px;
    border:2px solid var(--border);
    border-radius:10px;
    font-size:15px;
    font-family:'Noto Sans JP',sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:border-color .2s;
  }
  .form-input:focus { outline:none; border-color:var(--brown-light); }
  .modal-actions { display:flex; gap:10px; margin-top:24px; }
  .btn-primary {
    flex:1; padding:13px;
    background:linear-gradient(135deg,var(--brown),var(--brown-mid));
    color:#fff; border:none; border-radius:12px;
    font-size:15px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
    transition:all .2s;
  }
  .btn-primary:hover { opacity:.9; }
  .btn-cancel {
    flex:1; padding:13px;
    background:var(--bg2); color:var(--text2);
    border:2px solid var(--border); border-radius:12px;
    font-size:15px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
  }
  .btn-danger {
    padding:13px 20px;
    background:#fff0f0; color:var(--red);
    border:2px solid #f0c0c0; border-radius:12px;
    font-size:14px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
  }

  /* TOAST */
  .toast {
    position:fixed; bottom:32px; left:50%;
    transform:translateX(-50%) translateY(100px);
    background:var(--brown-dark);
    color:#f5e6d0;
    padding:14px 28px;
    border-radius:50px;
    font-size:14px; font-weight:700;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
    z-index:999;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
    letter-spacing:.06em;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* AVATAR COLORS */
  .av-0 { background:#c8956c; color:#fff; }
  .av-1 { background:#5a8a3c; color:#fff; }
  .av-2 { background:#4a7aab; color:#fff; }
  .av-3 { background:#9a5ab0; color:#fff; }
  .av-4 { background:#c04040; color:#fff; }
  .av-5 { background:#d4a843; color:#fff; }
  .av-6 { background:#3a9a8a; color:#fff; }
  .av-7 { background:#b06040; color:#fff; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

  /* iPad specific */
  @media (max-width:768px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { max-height:200px; border-right:none; border-bottom:2px solid var(--border); }
    .main { max-height:none; }
    .stats-row { grid-template-columns:repeat(3,1fr); }
    .tickets-row { grid-template-columns:repeat(11,1fr); }
    .action-row { flex-direction:column; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">☕</div>
    <div>
      <div class="header-title">COFFEE TICKET</div>
      <div class="header-sub">コーヒー回数券 管理システム</div>
    </div>
  </div>
  <div class="header-right">
    <button class="header-btn save-btn" onclick="exportData()">💾 バックアップ保存</button>
    <button class="header-btn load-btn" onclick="document.getElementById('file-input').click()">📂 データ読み込み</button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="importData(event)">
    <div class="header-divider"></div>
    <button class="header-btn" onclick="openAddUser()">＋ 利用者を追加</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">利用者一覧</div>
    <div id="user-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">☕</div>
      <h2>利用者を選択してください</h2>
      <p>左のリストから利用者を選ぶか、<br>新しい利用者を追加してください</p>
    </div>
    <div id="user-detail" style="display:none"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL: Add/Edit User -->
<div class="modal-overlay" id="modal-user">
  <div class="modal">
    <div class="modal-title" id="modal-user-title">利用者を追加</div>
    <div class="form-group">
      <label class="form-label">お名前</label>
      <input class="form-input" id="input-name" type="text" placeholder="例：山田 太郎" maxlength="20">
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <input class="form-input" id="input-memo" type="text" placeholder="例：常連さん" maxlength="40">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-user')">キャンセル</button>
      <button class="btn-primary" id="btn-save-user" onclick="saveUser()">追加する</button>
      <button class="btn-danger" id="btn-delete-user" style="display:none" onclick="deleteUser()">削除</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Use -->
<div class="modal-overlay" id="modal-use">
  <div class="modal">
    <div class="modal-title">☕ 1枚使用しますか？</div>
    <p style="color:var(--text2);margin-bottom:8px;" id="modal-use-name"></p>
    <p style="font-size:13px;color:var(--text3);">現在使用中の券から1枚スタンプします</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-use')">キャンセル</button>
      <button class="btn-primary" onclick="confirmUse()">使用する</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Buy -->
<div class="modal-overlay" id="modal-buy">
  <div class="modal">
    <div class="modal-title">📋 回数券を購入しますか？</div>
    <p style="color:var(--text2);margin-bottom:8px;" id="modal-buy-name"></p>
    <p style="font-size:13px;color:var(--text3);">11枚つづりの回数券を1冊追加します</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-buy')">キャンセル</button>
      <button class="btn-primary" onclick="confirmBuy()">購入する</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Delete User -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal">
    <div class="modal-title" style="color:var(--red);">🗑️ 利用者を削除しますか？</div>
    <p style="color:var(--text2);margin-bottom:8px;" id="modal-delete-name"></p>
    <p style="font-size:13px;color:var(--text3);">この操作は取り消せません。<br>購入・使用履歴も全て削除されます。</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-delete')">キャンセル</button>
      <button class="btn-danger" onclick="confirmDeleteUser()">削除する</button>
    </div>
  </div>
</div>

<script>
// ===========================
// DATA MODEL & STORAGE
// ===========================
const STORAGE_KEY = 'coffee_ticket_v2';
let state = { users: [], selectedUserId: null };

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
    } else {
      // 初回起動時：CSVインポートデータを初期データとして使用
      state = JSON.parse(JSON.stringify(SEED_DATA));
      save();
    }
  } catch(e) { 
    state = JSON.parse(JSON.stringify(SEED_DATA));
  }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function dateStr() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function dtStr() {
  const d = new Date();
  return `${dateStr()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function getUser(uid2) { return state.users.find(u => u.id === uid2); }
function getActiveBook(user) { return user.books.find(b => !b.complete); }
function totalRemaining(user) { 
  return user.books.reduce((s,b) => s + (11 - b.used), 0);
}
function totalUsed(user) { return user.books.reduce((s,b) => s + b.used, 0); }

// ===========================
// RENDER
// ===========================
function render() {
  renderSidebar();
  renderMain();
}

function avatarClass(user) {
  const idx = state.users.indexOf(user) % 8;
  return `av-${idx}`;
}
function avatarLetter(user) {
  return user.name.charAt(0);
}

function renderSidebar() {
  const el = document.getElementById('user-list');
  if (!state.users.length) {
    el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px;">利用者がいません</div>`;
    return;
  }
  el.innerHTML = state.users.map(user => {
    const rem = totalRemaining(user);
    const active = user.id === state.selectedUserId ? 'active' : '';
    const ac = avatarClass(user);
    const al = avatarLetter(user);
    return `
    <div class="user-item ${active}" onclick="selectUser('${user.id}')">
      <div class="user-avatar ${ac}">${al}</div>
      <div class="user-info">
        <div class="user-name">${esc(user.name)}</div>
        <div class="user-meta">${user.memo ? esc(user.memo) : '回数券 '+user.books.length+'冊'}</div>
      </div>
      <div class="user-tickets-badge ${rem===0?'empty':''}">${rem}枚</div>
    </div>`;
  }).join('');
}

function renderMain() {
  const user = state.selectedUserId ? getUser(state.selectedUserId) : null;
  document.getElementById('empty-state').style.display = user ? 'none' : 'flex';
  document.getElementById('user-detail').style.display = user ? 'block' : 'none';
  if (!user) return;

  const ac = avatarClass(user);
  const al = avatarLetter(user);
  const activeBook = getActiveBook(user);
  const rem = totalRemaining(user);
  const used = totalUsed(user);

  const booksHTML = user.books.slice().reverse().map((b, ri) => {
    const i = user.books.length - 1 - ri;
    const isActive = !b.complete;
    const brem = 11 - b.used;
    let cellsHTML = '';
    for (let t = 0; t < 11; t++) {
      if (t === 10) {
        cellsHTML += `<div class="t-cell bonus ${t < b.used ? 'used' : ''}">${t < b.used ? '☕' : '🎁'}</div>`;
      } else if (t < b.used) {
        cellsHTML += `<div class="t-cell used">☕</div>`;
      } else {
        cellsHTML += `<div class="t-cell unused">${t+1}</div>`;
      }
    }
    return `
    <div class="book-card ${isActive?'active-book':''} ${b.complete?'complete':''}">
      <div class="book-card-header">
        <div class="book-id">冊 #${i+1} &nbsp;購入日: ${b.buyDate}</div>
        <div class="book-status ${b.complete?'done':'in-use'}">${b.complete?'✅ 使い切り':'使用中'}</div>
      </div>
      <div class="tickets-row">${cellsHTML}</div>
      <div class="book-footer">
        <div class="book-dates">
          ${b.complete ? '完了日: '+b.completeDate : '使用開始'}
        </div>
        <div class="book-remain">残り ${brem}枚</div>
      </div>
    </div>`;
  }).join('');

  // history (latest 15)
  const hist = [...user.history].reverse().slice(0,20);
  const histHTML = hist.length ? hist.map(h => `
    <tr>
      <td>${h.date}</td>
      <td><span class="${h.action==='購入'?'badge-buy':'badge-use'}">${h.action}</span></td>
      <td>${esc(h.note||'')}</td>
    </tr>`).join('') : `<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:20px;">履歴なし</td></tr>`;

  document.getElementById('user-detail').innerHTML = `
    <div class="user-header">
      <div class="user-header-avatar ${ac}">${al}</div>
      <div>
        <div class="user-header-name">${esc(user.name)}</div>
        <div class="user-header-since">${user.memo ? esc(user.memo) : ''} &nbsp;登録日: ${user.createdAt}</div>
      </div>
      <div class="user-header-actions">
        <button class="btn-edit" onclick="openEditUser('${user.id}')">✏️ 編集</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" style="color:var(--brown-light)">${rem}</div>
        <div class="stat-label">残り枚数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--brown)">${used}</div>
        <div class="stat-label">総使用枚数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--gold)">${user.books.length}</div>
        <div class="stat-label">購入冊数</div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-buy" onclick="openBuy()">📋 回数券を購入 (+11枚)</button>
      <button class="btn-use" onclick="openUse()" ${rem===0?'disabled':''}>☕ 1枚使う</button>
      ${activeBook && activeBook.used > 0 ? `<button class="btn-undo" onclick="undoUse()">↩ 取り消す</button>` : ''}
    </div>

    <div class="section-title">所有中の回数券</div>
    <div class="books-grid">${booksHTML || '<div style="color:var(--text3);text-align:center;padding:20px;">まだ購入されていません</div>'}</div>

    <div class="section-title">使用・購入履歴</div>
    <div class="history-wrap">
      <table class="history-table">
        <thead><tr><th>日時</th><th>種類</th><th>備考</th></tr></thead>
        <tbody>${histHTML}</tbody>
      </table>
    </div>
  `;
}

// ===========================
// ACTIONS
// ===========================
function selectUser(id) {
  state.selectedUserId = id;
  render();
}

let editingUserId = null;
function openAddUser() {
  editingUserId = null;
  document.getElementById('modal-user-title').textContent = '利用者を追加';
  document.getElementById('input-name').value = '';
  document.getElementById('input-memo').value = '';
  document.getElementById('btn-save-user').textContent = '追加する';
  document.getElementById('btn-delete-user').style.display = 'none';
  openModal('modal-user');
  setTimeout(()=>document.getElementById('input-name').focus(),100);
}
function openEditUser(id) {
  editingUserId = id;
  const user = getUser(id);
  document.getElementById('modal-user-title').textContent = '利用者を編集';
  document.getElementById('input-name').value = user.name;
  document.getElementById('input-memo').value = user.memo || '';
  document.getElementById('btn-save-user').textContent = '保存する';
  document.getElementById('btn-delete-user').style.display = '';
  openModal('modal-user');
}
function saveUser() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { showToast('⚠️ 名前を入力してください'); return; }
  const memo = document.getElementById('input-memo').value.trim();
  if (editingUserId) {
    const user = getUser(editingUserId);
    user.name = name; user.memo = memo;
    showToast('✅ 利用者情報を更新しました');
  } else {
    const newUser = {
      id: uid(), name, memo,
      createdAt: dateStr(),
      books: [], history: []
    };
    state.users.push(newUser);
    state.selectedUserId = newUser.id;
    showToast('✅ 利用者を追加しました');
  }
  save(); closeModal('modal-user'); render();
}
function deleteUser() {
  const user = getUser(editingUserId);
  document.getElementById('modal-delete-name').textContent = `👤 ${user.name} さん`;
  closeModal('modal-user');
  openModal('modal-delete');
}
function confirmDeleteUser() {
  state.users = state.users.filter(u => u.id !== editingUserId);
  if (state.selectedUserId === editingUserId) state.selectedUserId = null;
  save(); closeModal('modal-delete'); render();
  showToast('🗑️ 利用者を削除しました');
}

function openBuy() {
  const user = getUser(state.selectedUserId);
  document.getElementById('modal-buy-name').textContent = `👤 ${user.name} さん`;
  openModal('modal-buy');
}
function confirmBuy() {
  const user = getUser(state.selectedUserId);
  const book = { id: uid(), buyDate: dateStr(), used: 0, complete: false, completeDate: null };
  user.books.push(book);
  user.history.push({ date: dtStr(), action:'購入', note:`冊 #${user.books.length}` });
  save(); closeModal('modal-buy'); render();
  showToast('📋 回数券を1冊追加しました（11枚）');
}

function openUse() {
  const user = getUser(state.selectedUserId);
  document.getElementById('modal-use-name').textContent = `👤 ${user.name} さん`;
  openModal('modal-use');
}
function confirmUse() {
  const user = getUser(state.selectedUserId);
  const book = getActiveBook(user);
  if (!book) { showToast('⚠️ 有効な回数券がありません'); closeModal('modal-use'); return; }
  book.used++;
  const bookIdx = user.books.indexOf(book)+1;
  user.history.push({ date: dtStr(), action:'使用', note:`冊 #${bookIdx} (残り${11-book.used}枚)` });
  if (book.used === 11) { book.complete = true; book.completeDate = dateStr(); showToast('🎉 1冊使い切りました！'); }
  else { showToast(`☕ 1枚使用しました（残り${11-book.used}枚）`); }
  save(); closeModal('modal-use'); render();
}
function undoUse() {
  const user = getUser(state.selectedUserId);
  // find last used book
  let book = null;
  for (let i = user.books.length-1; i >= 0; i--) {
    if (user.books[i].used > 0) { book = user.books[i]; break; }
  }
  if (!book) return;
  book.used--;
  if (book.complete) { book.complete = false; book.completeDate = null; }
  // remove last use history
  for (let i = user.history.length-1; i >= 0; i--) {
    if (user.history[i].action === '使用') { user.history.splice(i,1); break; }
  }
  save(); render();
  showToast('↩ 使用を取り消しました');
}

// ===========================
// MODAL UTILS
// ===========================
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); });
});

// ===========================
// TOAST
// ===========================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

// ===========================
// HELPERS
// ===========================
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Enter key on input
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal-user').classList.contains('open')) saveUser();
});

// ===========================
// EXPORT / IMPORT
// ===========================
function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  const a = document.createElement('a');
  a.href = url;
  a.download = `coffee_ticket_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 バックアップファイルを保存しました');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.users) throw new Error('invalid');
      if (!confirm(`データを読み込みます。\n現在のデータは上書きされます。\n\n利用者数: ${imported.users.length}名\n\nよろしいですか？`)) return;
      state = imported;
      save();
      render();
      showToast(`📂 ${imported.users.length}名のデータを読み込みました`);
    } catch {
      showToast('⚠️ ファイルの読み込みに失敗しました');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}


load();
render();
</script>
</body>
</html>
